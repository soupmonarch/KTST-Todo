<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>KTST Task Matrix</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    color: #1f2937; background: #ffffff;
  }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; border-bottom: 1px solid #e5e7eb;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  .live-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; background: #ecfdf5; color: #047857;
    border-radius: 999px; font-size: 11px; font-weight: 600;
  }
  .live-dot { width: 6px; height: 6px; background: #10b981; border-radius: 50%; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  #meta { margin-left: auto; font-size: 12px; color: #6b7280; }
  #reloadBtn { background: #f3f4f6; border: 1px solid #d1d5db; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  #reloadBtn:hover { background: #e5e7eb; }
  main { padding: 16px 20px 24px; }
  #status { font-size: 13px; color: #6b7280; padding: 8px 0; }
  #chart-wrap { position: relative; width: 100%; }
  svg { width: 100%; height: auto; display: block; }
  .grain { cursor: pointer; transition: r 0.12s, stroke-width 0.12s; }
  .grain:hover { stroke: #111827; stroke-width: 2; }
  .axis-label { font-size: 11px; fill: #6b7280; font-weight: 500; }
  .quad-label { font-size: 10px; fill: #9ca3af; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .axis-tick { font-size: 9px; fill: #9ca3af; }
  #tooltip {
    position: absolute; pointer-events: none; background: #111827; color: #f9fafb;
    padding: 8px 11px; border-radius: 6px; font-size: 11px; line-height: 1.5;
    max-width: 260px; opacity: 0; transition: opacity 0.1s; z-index: 10;
  }
  #tooltip .t-name { font-weight: 600; margin-bottom: 4px; font-size: 12px; }
  #tooltip .t-row { color: #d1d5db; }
  #tooltip .t-row b { color: #f9fafb; font-weight: 500; }
  #legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 14px; font-size: 11px; color: #4b5563; }
  #legend .item { display: inline-flex; align-items: center; gap: 5px; }
  #legend .swatch { width: 10px; height: 10px; border-radius: 50%; }
  table.task-list { width: 100%; border-collapse: collapse; margin-top: 18px; font-size: 12px; }
  table.task-list th, table.task-list td { text-align: left; padding: 6px 9px; border-bottom: 1px solid #e5e7eb; }
  table.task-list th { background: #f9fafb; font-weight: 600; color: #374151; }
  table.task-list a { color: #2563eb; text-decoration: none; }
  table.task-list a:hover { text-decoration: underline; }
  .err { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; padding: 12px; border-radius: 6px; font-size: 13px; white-space: pre-wrap; word-break: break-all; }
</style>
</head>
<body>
<header>
  <h1>KTST Task Matrix</h1>
  <span class="live-badge"><span class="live-dot"></span>LIVE</span>
  <span id="meta"></span>
  <button id="reloadBtn" onclick="loadData()">↻ 새로고침</button>
</header>
<main>
  <div id="status">로딩 중…</div>
  <div id="chart-wrap">
    <svg id="chart" viewBox="0 0 800 560" preserveAspectRatio="xMidYMid meet"></svg>
    <div id="tooltip"></div>
  </div>
  <div id="legend"></div>
  <div id="list"></div>
</main>
<script>
const W = 800, H = 560;
const PAD = { top: 40, right: 30, bottom: 60, left: 60 };
const INNER_W = W - PAD.left - PAD.right;
const INNER_H = H - PAD.top - PAD.bottom;

// Category 3 색상 매핑 (Notion select 색상과 유사)
const CAT3_COLORS = {
  "Sales": "#ec4899",   // pink
  "Tech":  "#f97316",   // orange
  "PM":    "#6b7280",   // gray (default)
  "Service": "#ef4444", // red
  "_none": "#cbd5e1"   // 미설정
};
function colorForCat3(c) { return CAT3_COLORS[c] || CAT3_COLORS._none; }

// 점 크기: importance에 비례 (3~9px)
function radiusFor(importance) {
  const i = Math.max(1, Math.min(10, importance || 5));
  return 3 + (i / 10) * 6;
}

function scaleX(urgency) {
  // 1~10 → 0~1
  const u = Math.max(1, Math.min(10, urgency == null ? 5 : urgency));
  return (u - 1) / 9;
}
function scaleY(importance) {
  // 1~10 → 0~1 (높을수록 위로)
  const i = Math.max(1, Math.min(10, importance == null ? 5 : importance));
  return 1 - (i - 1) / 9;
}

function px(x) { return PAD.left + x * INNER_W; }
function py(y) { return PAD.top + y * INNER_H; }

function drawFrame(svg) {
  // 4사분면 배경 (Q1 우상 / Q2 좌상 / Q3 우하 / Q4 좌하)
  // 기준: 중앙점 = (5.5, 5.5)
  const midX = px(scaleX(5.5));
  const midY = py(scaleY(5.5));
  const quads = [
    { x: midX, y: PAD.top, w: PAD.left + INNER_W - midX, h: midY - PAD.top, fill: "#fde68a33", label: "Q1 • 긴급·중요", lx: PAD.left + INNER_W - 8, ly: PAD.top + 14, anchor: "end" },
    { x: PAD.left, y: PAD.top, w: midX - PAD.left, h: midY - PAD.top, fill: "#bbf7d033", label: "Q2 • 계획", lx: PAD.left + 8, ly: PAD.top + 14, anchor: "start" },
    { x: midX, y: midY, w: PAD.left + INNER_W - midX, h: PAD.top + INNER_H - midY, fill: "#fecaca33", label: "Q3 • 위임", lx: PAD.left + INNER_W - 8, ly: PAD.top + INNER_H - 6, anchor: "end" },
    { x: PAD.left, y: midY, w: midX - PAD.left, h: PAD.top + INNER_H - midY, fill: "#e5e7eb55", label: "Q4 • 제거", lx: PAD.left + 8, ly: PAD.top + INNER_H - 6, anchor: "start" }
  ];
  for (const q of quads) {
    svg.insertAdjacentHTML("beforeend",
      `<rect x="${q.x}" y="${q.y}" width="${q.w}" height="${q.h}" fill="${q.fill}"/>` +
      `<text class="quad-label" x="${q.lx}" y="${q.ly}" text-anchor="${q.anchor}">${q.label}</text>`
    );
  }

  // 교차 축 (중앙선)
  svg.insertAdjacentHTML("beforeend",
    `<line x1="${midX}" y1="${PAD.top}" x2="${midX}" y2="${PAD.top + INNER_H}" stroke="#e5e7eb" stroke-dasharray="3,3"/>` +
    `<line x1="${PAD.left}" y1="${midY}" x2="${PAD.left + INNER_W}" y2="${midY}" stroke="#e5e7eb" stroke-dasharray="3,3"/>`
  );

  // 외곽 사각형
  svg.insertAdjacentHTML("beforeend",
    `<rect x="${PAD.left}" y="${PAD.top}" width="${INNER_W}" height="${INNER_H}" fill="none" stroke="#d1d5db"/>`
  );

  // 축 레이블
  svg.insertAdjacentHTML("beforeend",
    `<text class="axis-label" x="${PAD.left + INNER_W / 2}" y="${H - 22}" text-anchor="middle">Urgency → (높을수록 긴급)</text>` +
    `<text class="axis-label" x="${20}" y="${PAD.top + INNER_H / 2}" text-anchor="middle" transform="rotate(-90 20 ${PAD.top + INNER_H / 2})">Importance ↑ (높을수록 중요)</text>`
  );

  // 틱 (1, 5, 10)
  for (const v of [1, 5, 10]) {
    const x = px(scaleX(v));
    svg.insertAdjacentHTML("beforeend", `<text class="axis-tick" x="${x}" y="${PAD.top + INNER_H + 14}" text-anchor="middle">${v}</text>`);
    const y = py(scaleY(v));
    svg.insertAdjacentHTML("beforeend", `<text class="axis-tick" x="${PAD.left - 8}" y="${y + 3}" text-anchor="end">${v}</text>`);
  }
}

function jitterOverlaps(points) {
  // 같은 좌표에 여러 task가 모이면 원형으로 흔트림
  const groups = {};
  for (const p of points) {
    const key = `${Math.round(p.x * 50)}_${Math.round(p.y * 50)}`;
    (groups[key] = groups[key] || []).push(p);
  }
  for (const arr of Object.values(groups)) {
    if (arr.length === 1) continue;
    const R = 0.02;
    arr.forEach((p, i) => {
      const a = (i / arr.length) * Math.PI * 2;
      p.x += Math.cos(a) * R;
      p.y += Math.sin(a) * R;
    });
  }
}

function formatDate(s) {
  if (!s) return "—";
  return s.length > 10 ? s.slice(0, 10) : s;
}
function daysFromNow(s) {
  if (!s) return null;
  const d = new Date(s);
  if (isNaN(d)) return null;
  return Math.ceil((d - new Date()) / (1000 * 60 * 60 * 24));
}

function render(data) {
  const status = document.getElementById("status");
  const svg = document.getElementById("chart");
  const list = document.getElementById("list");
  const legend = document.getElementById("legend");
  const meta = document.getElementById("meta");
  const tip = document.getElementById("tooltip");

  svg.innerHTML = "";
  list.innerHTML = "";
  legend.innerHTML = "";

  meta.textContent = `${data.count}개 task · ${new Date(data.snapshotAt).toLocaleTimeString("ko-KR")} 기준`;
  status.textContent = data.count === 0 ? "표시할 task가 없습니다 (모두 Completed이거
ub098 비어있음)." : "";

  drawFrame(svg);

  // 점 조집
  const points = data.tasks.map(t => ({
    x: scaleX(t.urgency),
    y: scaleY(t.importance),
    r: radiusFor(t.importance),
    color: colorForCat3(t.category3),
    task: t
  }));
  jitterOverlaps(points);

  for (const p of points) {
    const cx = px(p.x), cy = py(p.y);
    const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    c.setAttribute("class", "grain");
    c.setAttribute("cx", cx);
    c.setAttribute("cy", cy);
    c.setAttribute("r", p.r);
    c.setAttribute("fill", p.color);
    c.setAttribute("fill-opacity", "0.85");
    c.setAttribute("stroke", "#ffffff");
    c.setAttribute("stroke-width", "1");
    c.addEventListener("click", () => window.open(p.task.url, "_blank"));
    c.addEventListener("mouseenter", (e) => {
      const t = p.task;
      const d = daysFromNow(t.due);
      const dueStr = t.due ? `${formatDate(t.due)} (${d == null ? "-" : d >= 0 ? `D-${d}` : `D+${-d}`})` : "—";
      tip.innerHTML =
        `<div class="t-name">${escapeHtml(t.name || "(제목 없음)")}</div>` +
        (t.task ? `<div class="t-row">${escapeHtml(t.task)}</div>` : "") +
        (t.epic ? `<div class="t-row"><b>EPIC</b> ${escapeHtml(t.epic)}</div>` : "") +
        `<div class="t-row"><b>Urgency</b> ${t.urgency ?? "-"} · <b>Importance</b> ${t.importance ?? "-"}</div>` +
        `<div class="t-row"><b>Due</b> ${dueStr}</div>` +
        (t.start ? `<div class="t-row"><b>Start</b> ${formatDate(t.start)}</div>` : "") +
        ((t.category1 || t.category2 || t.category3) ? `<div class="t-row"><b>Cat</b> ${[t.category1, t.category2, t.category3].filter(Boolean).join(" / ")}</div>` : "") +
        (t.lead.length ? `<div class="t-row"><b>Lead</b> ${escapeHtml(t.lead.join(", "))}</div>` : "") +
        (t.owner.length ? `<div class="t-row"><b>Owner</b> ${escapeHtml(t.owner.join(", "))}</div>` : "") +
        (t.status ? `<div class="t-row"><b>Status</b> ${t.status}</div>` : "");
      tip.style.opacity = "1";
    });
    c.addEventListener("mousemove", (e) => {
      const wrap = document.getElementById("chart-wrap").getBoundingClientRect();
      tip.style.left = (e.clientX - wrap.left + 12) + "px";
      tip.style.top = (e.clientY - wrap.top + 12) + "px";
    });
    c.addEventListener("mouseleave", () => { tip.style.opacity = "0"; });
    svg.appendChild(c);
  }

  // 범례
  const cats = [...new Set(data.tasks.map(t => t.category3).filter(Boolean))];
  cats.sort();
  for (const cat of cats) {
    legend.insertAdjacentHTML("beforeend",
      `<span class="item"><span class="swatch" style="background:${colorForCat3(cat)}"></span>${escapeHtml(cat)}</span>`);
  }
  if (data.tasks.some(t => !t.category3)) {
    legend.insertAdjacentHTML("beforeend",
      `<span class="item"><span class="swatch" style="background:${CAT3_COLORS._none}"></span>(Category 3 없음)</span>`);
  }

  // 아래 표
  if (data.tasks.length) {
    const sorted = [...data.tasks].sort((a, b) => {
      const sa = (a.importance || 0) + (a.urgency || 0);
      const sb = (b.importance || 0) + (b.urgency || 0);
      return sb - sa;
    });
    let html = `<table class="task-list"><thead><tr>
      <th>Sub-Task</th><th>U</th><th>I</th><th>Cat 3</th><th>Due</th><th>Lead</th><th>Status</th>
      </tr></thead><tbody>`;
    for (const t of sorted) {
      html += `<tr>
        <td><a href="${t.url}" target="_blank">${escapeHtml(t.name || "(제목 없음)")}</a></td>
        <td>${t.urgency ?? "-"}</td>
        <td>${t.importance ?? "-"}</td>
        <td>${escapeHtml(t.category3 || "-")}</td>
        <td>${formatDate(t.due)}</td>
        <td>${escapeHtml(t.lead.join(", ") || "-")}</td>
        <td>${escapeHtml(t.status || "-")}</td>
      </tr>`;
    }
    html += `</tbody></table>`;
    list.innerHTML = html;
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

async function loadData() {
  const status = document.getElementById("status");
  status.textContent = "로딩 중…";
  status.classList.remove("err");
  try {
    const r = await fetch("/api/tasks", { cache: "no-store" });
    const j = await r.json();
    if (!r.ok) {
      status.innerHTML = `<div class="err">로딩 실패 (${r.status}): ${escapeHtml(JSON.stringify(j))}</div>`;
      return;
    }
    render(j);
  } catch (e) {
    status.innerHTML = `<div class="err">네트워크 오류: ${escapeHtml(String(e))}</div>`;
  }
}

loadData();
</script>
</body>
</html>
